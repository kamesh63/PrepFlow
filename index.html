<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertMastery — 51-Day Data Engineering Certification Quiz</title>
  <meta name="description" content="Master data engineering concepts with 5,100 tricky questions across 51 days. Python, SQL, Spark, Snowflake, DBT, DataStage & IDMC.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div id="app">
    <!-- ===== LOGIN VIEW ===== -->
    <div id="login-view" class="view active">
      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <span class="login-emoji">🎯</span>
            <h1>Cert<span class="logo-accent">Mastery</span></h1>
            <p class="login-tagline">51-Day Data Engineering Certification Quiz</p>
          </div>
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="login-username">Username</label>
              <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username" minlength="3" maxlength="20">
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" minlength="4">
            </div>
            <div id="login-error" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn-primary login-btn">Sign In</button>
          </form>
          <div class="login-divider"><span>or</span></div>
          <button class="btn-ghost register-btn" onclick="showRegister()">Create New Account</button>
          <button class="btn-ghost admin-login-btn" onclick="showAdminLogin()">🔐 Admin Panel</button>
        </div>
      </div>
    </div>

    <!-- ===== REGISTER VIEW ===== -->
    <div id="register-view" class="view">
      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <span class="login-emoji">📝</span>
            <h1>Create Account</h1>
            <p class="login-tagline">Join CertMastery today</p>
          </div>
          <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="reg-fullname">Full Name</label>
              <input type="text" id="reg-fullname" placeholder="Your full name" required minlength="2" maxlength="50">
            </div>
            <div class="form-group">
              <label for="reg-mobile">Mobile Number</label>
              <input type="tel" id="reg-mobile" placeholder="Enter 10-digit mobile number" required pattern="[0-9]{10}" maxlength="10" title="Enter a valid 10-digit mobile number">
            </div>
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" placeholder="Choose a username" required minlength="3" maxlength="20">
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="Create a password" required minlength="4">
            </div>
            <div id="register-error" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn-primary login-btn">Create Account</button>
          </form>
          <button class="btn-ghost register-btn" onclick="showLogin()">← Back to Sign In</button>
        </div>
      </div>
    </div>

    <!-- ===== ADMIN LOGIN VIEW ===== -->
    <div id="admin-login-view" class="view">
      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <span class="login-emoji">🔐</span>
            <h1>Admin Panel</h1>
            <p class="login-tagline">Monitor users and analytics</p>
          </div>
          <form id="admin-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
              <label for="admin-password">Admin Password</label>
              <input type="password" id="admin-password" placeholder="Enter admin password" required>
            </div>
            <div id="admin-error" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn-primary login-btn">Access Admin Panel</button>
          </form>
          <button class="btn-ghost register-btn" onclick="showLogin()">← Back to Sign In</button>
        </div>
      </div>
    </div>

    <!-- ===== ADMIN DASHBOARD VIEW ===== -->
    <div id="admin-view" class="view"></div>

    <!-- ===== HEADER (hidden until login) ===== -->
    <header id="header" style="display:none;">
      <div class="header-left">
        <button class="icon-btn home-btn" onclick="navigate('dashboard')" title="Dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
        <div class="logo-group">
          <h1 class="logo">Cert<span class="logo-accent">Mastery</span></h1>
          <span class="logo-tag">Data Engineering</span>
        </div>
      </div>
      <div class="header-center">

      </div>
      <div class="header-right">
        <span class="user-greeting" id="user-greeting"></span>
        <button class="icon-btn theme-btn" id="theme-toggle" onclick="toggleDarkMode()" title="Toggle Theme">
          ☀️
        </button>
        <button class="icon-btn logout-btn" onclick="handleLogout()" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== VIEWS ===== -->
    <main id="dashboard-view" class="view"></main>
    <main id="quiz-view" class="view"></main>
    <main id="summary-view" class="view"></main>
    <main id="review-view" class="view"></main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
